<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="LifeOS">
  <defs>
    <linearGradient id="lifeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00b8d4"/>
    </linearGradient>
    <filter id="lifeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" fill="#0a0a14"/>

  <g transform="translate(0, 8)">
    <g stroke="#00e5ff" stroke-width="1" opacity="0.05">
      <line x1="0" y1="128" x2="512" y2="128"/>
      <line x1="0" y1="256" x2="512" y2="256"/>
      <line x1="0" y1="384" x2="512" y2="384"/>
      <line x1="128" y1="0" x2="128" y2="512"/>
      <line x1="256" y1="0" x2="256" y2="512"/>
      <line x1="384" y1="0" x2="384" y2="512"/>
    </g>

    <text
      x="256"
      y="278"
      font-family="Orbitron, 'Arial Black', 'Segoe UI', system-ui, sans-serif"
      font-size="72"
      font-weight="700"
      letter-spacing="5"
      text-anchor="middle"
    >
      <tspan fill="url(#lifeGrad)" filter="url(#lifeGlow)">Life</tspan><tspan fill="#e8e8f5">OS</tspan>
    </text>
  </g>
</svg>
