<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0a0a14"/>
  <rect x="1" y="1" width="510" height="510" rx="95" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.6"/>
  <!-- Grid background lines -->
  <line x1="0" y1="170" x2="512" y2="170" stroke="#00e5ff" stroke-width="0.5" opacity="0.08"/>
  <line x1="0" y1="340" x2="512" y2="340" stroke="#00e5ff" stroke-width="0.5" opacity="0.08"/>
  <line x1="170" y1="0" x2="170" y2="512" stroke="#00e5ff" stroke-width="0.5" opacity="0.08"/>
  <line x1="340" y1="0" x2="340" y2="512" stroke="#00e5ff" stroke-width="0.5" opacity="0.08"/>
  <!-- Glow circle -->
  <circle cx="256" cy="230" r="110" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.15"/>
  <!-- "L" letter  Life -->
  <text x="256" y="295"
        font-family="Arial Black, Impact, sans-serif"
        font-size="200"
        font-weight="900"
        text-anchor="middle"
        fill="url(#cyan)"
        filter="url(#glow)">L</text>
  <!-- OS label -->
  <text x="256" y="370"
        font-family="Arial, sans-serif"
        font-size="52"
        font-weight="700"
        letter-spacing="24"
        text-anchor="middle"
        fill="#ffffff"
        opacity="0.7">OS</text>
  <defs>
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
